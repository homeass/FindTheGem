appId: com.findthegem.app
productName: Find the Gem
copyright: Copyright © 2024 Find the Gem Team
directories:
  output: dist
files:
  - main.js
  - preload.js
  - loading.html
  - icon.icns
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  icon: icon.icns
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
dmg:
  title: Find the Gem
  icon: icon.icns
  background: dmg-background.png
  iconSize: 100
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
asar: false
compression: maximum
extraResources:
  - from: ../.venv
    to: .venv
    filter:
      - '**/*'
  - from: ../findthegem_app.py
    to: findthegem_app.py
  - from: ../requirements_findthegem.txt
    to: requirements_findthegem.txt