<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find the Gem - Loading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      text-align: center;
      padding: 2rem;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .gem-icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.2));
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(-5deg);
      }
      50% {
        transform: translateY(-15px) rotate(5deg);
      }
    }

    .app-name {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 0%, #e8eaff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .app-tagline {
      font-size: 1.1rem;
      font-weight: 300;
      opacity: 0.9;
      margin-bottom: 3rem;
      letter-spacing: 0.01em;
    }

    .loading-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 
        0 0 20px rgba(255, 255, 255, 0.1),
        inset 0 0 20px rgba(255, 255, 255, 0.05);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 1rem;
      font-weight: 400;
      opacity: 0.85;
      letter-spacing: 0.02em;
    }

    .dots {
      display: inline-flex;
      gap: 4px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      opacity: 0.4;
      animation: pulse 1.4s ease-in-out infinite both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    .dot:nth-child(3) { animation-delay: 0s; }

    @keyframes pulse {
      0%, 80%, 100% {
        transform: scale(0.8);
        opacity: 0.4;
      }
      40% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

    .progress-bar {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 1rem;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffffff 0%, #a8b4ff 100%);
      border-radius: 2px;
      animation: progress 3s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    @keyframes progress {
      0% {
        width: 0%;
        margin-left: 0%;
      }
      50% {
        width: 60%;
        margin-left: 0%;
      }
      100% {
        width: 0%;
        margin-left: 100%;
      }
    }

    .powered-by {
      margin-top: 3rem;
      font-size: 0.85rem;
      font-weight: 300;
      opacity: 0.6;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .powered-by span {
      font-weight: 500;
      opacity: 0.8;
    }

    .error-message {
      display: none;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 2rem;
      max-width: 400px;
      text-align: left;
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .error-message.visible {
      display: block;
    }

    .error-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .error-detail {
      font-size: 0.9rem;
      opacity: 0.8;
      line-height: 1.5;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .gem-icon,
      .spinner,
      .dot,
      .progress-fill {
        animation: none;
      }
      .gem-icon {
        transform: rotate(-5deg);
      }
      .progress-fill {
        width: 50%;
        margin-left: 25%;
      }
    }

    /* Dark mode support (though we force our gradient) */
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="gem-icon" aria-hidden="true">💎</div>
    <h1 class="app-name">Find the Gem</h1>
    <p class="app-tagline">AI-Powered Research Platform</p>
    
    <div class="loading-wrapper">
      <div class="spinner" aria-hidden="true"></div>
      <p class="loading-text">
        Starting research engine
        <span class="dots" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </span>
      </p>
      <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-label="Loading progress">
        <div class="progress-fill"></div>
      </div>
    </div>

    <p class="powered-by">Powered by <span>Agent-Reach</span></p>

    <div class="error-message" id="errorMessage" role="alert">
      <div class="error-title">⚠️ Unable to Start</div>
      <div class="error-detail" id="errorDetail"></div>
    </div>
  </div>

  <script>
    // Listen for server errors from main process
    if (window.electronAPI && window.electronAPI.onServerError) {
      window.electronAPI.onServerError((error) => {
        const errorEl = document.getElementById('errorMessage');
        const detailEl = document.getElementById('errorDetail');
        detailEl.textContent = error;
        errorEl.classList.add('visible');
        
        // Hide spinner and progress
        document.querySelector('.spinner').style.display = 'none';
        document.querySelector('.progress-bar').style.display = 'none';
        document.querySelector('.loading-text').textContent = 'Failed to start';
      });
    }

    // Add subtle entrance animation for dots
    document.addEventListener('DOMContentLoaded', () => {
      const dots = document.querySelectorAll('.dot');
      dots.forEach((dot, i) => {
        dot.style.animationDelay = `${-0.32 + i * 0.16}s`;
      });
    });
  </script>
</body>
</html>
